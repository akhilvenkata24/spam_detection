name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf-sync.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub using CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U huggingface_hub
          huggingface-cli upload akhilvenkata24/spam-detection-api ./backend . --repo-type space --commit-message "Sync backend from GitHub"
